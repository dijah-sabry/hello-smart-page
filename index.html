<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Page</title>

    <!-- Google Fonts — loaded first per branding guide -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Cormorant+Garamond:wght@600&family=Dancing+Script:wght@600&family=Lato:wght@400;600&display=swap" rel="stylesheet">

    <style>
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Lato', sans-serif;
            background: linear-gradient(160deg, #FFF5F8 0%, #FCE4EC 60%, #E1BEE7 100%);
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #F8BBD0;
            border-radius: 16px;
            padding: 3rem 4rem;
            box-shadow: 0 2px 20px rgba(233, 30, 140, 0.08);
            animation: fadeSlideIn 350ms ease-in-out forwards;
        }

        .label {
            display: block;
            font-family: 'Dancing Script', cursive;
            font-weight: 600;
            font-size: 0.875rem;
            color: #AD6B7E;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            color: #880E4F;
            letter-spacing: 0.05em;
            text-shadow: 1px 1px 4px rgba(233, 30, 140, 0.15);
        }

        .ribbon {
            display: block;
            width: 60%;
            height: 4px;
            background: linear-gradient(135deg, #E91E8C, #F48FB1);
            border-radius: 2px;
            margin: 1.5rem auto;
        }

        button {
            background: #E91E8C;
            color: #FFFFFF;
            border: none;
            border-radius: 50px;
            padding: 0.75rem 2rem;
            font-family: 'Lato', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.08em;
            box-shadow: 0 4px 15px rgba(233, 30, 140, 0.35);
            cursor: pointer;
            transition: background 200ms ease-in-out, box-shadow 200ms ease-in-out, transform 200ms ease-in-out;
        }

        button:hover {
            background: #C2185B;
            box-shadow: 0 6px 20px rgba(194, 24, 91, 0.45);
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.98);
        }

        button:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(233, 30, 140, 0.25);
        }

        #message {
            margin-top: 1.5rem;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: #880E4F;
            letter-spacing: 0.05em;
            text-shadow: 1px 1px 4px rgba(233, 30, 140, 0.15);
            min-height: 2rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="label">✦ Welcome, Darling ✦</span>
        <h1>Hello, I Am So Smart!</h1>
        <span class="ribbon"></span>
        <button onclick="showMessage()">Tell Me Again!</button>
        <div id="message"></div>
    </div>

    <script>
        function showMessage() {
            document.getElementById('message').textContent = 'Oh you are so so smart!';
        }
    </script>
</body>
</html>
